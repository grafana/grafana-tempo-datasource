services:
  tempo:
    image: grafana/tempo:latest
    command: -config.file=/etc/tempo.yaml
    ports:
      - '3200:3200'
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./provisioning/tempo/tempo.yaml:/etc/tempo.yaml
  fake-tempo-data:
    image: grafana/fake-data-gen@sha256:c2800b47a1e946b58350dfd1385088f10650b3810d6d4c7d8e4ec3bb65d9a5e1
    depends_on:
      - tempo
    network_mode: 'service:tempo'
    environment:
      FD_DATASOURCE: tempo
      FD_PORT: 4318
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # Grafana 13 enables splashScreen by default; the overlay blocks Playwright interactions.
      GF_FEATURE_TOGGLES_splashScreen: 'false'
    volumes:
      - ./custom.ini:/etc/grafana/grafana.ini
